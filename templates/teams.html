<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Team Builder</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tom Select -->

    <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5 mb-5">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-body p-5">

                <h1 class="mb-4">
                    Team Management
                </h1>

                <!-- ===================== -->
                <!-- Number of Teams -->
                <!-- ===================== -->

                <div class="mb-4">

                    <label class="form-label">
                        Number of Teams
                    </label>

                    <input type="number" id="numTeams" class="form-control" min="1">

                </div>

                <button class="btn btn-primary mb-5" onclick="generateTeams()">
                    Create Team Forms
                </button>

                <!-- ===================== -->
                <!-- Dynamic Teams -->
                <!-- ===================== -->


                <div id="teamsContainer"></div>

                <input type="hidden" name="teams_data" id="teamsData">

                <button id="saveBtn" type="button" class="btn btn-success btn-lg mt-4" onclick="prepareData()">
                    Save Teams
                </button>
                <div id="loadingMessage" class="mt-3" style="display:none;">
                    <div class="spinner-border spinner-border-sm" role="status"></div>
                    Generating report... Please wait.
                </div>


                </form>

            </div>

        </div>

    </div>

    <!-- ===================== -->
    <!-- Scripts -->
    <!-- ===================== -->

    <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>

        pdfjsLib.GlobalWorkerOptions.workerSrc =
            "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        console.log(pdfjsLib);
    </script>

    <script>

        const participants = JSON.parse('{{ participants | tojson | safe }}');

        let tomSelectInstances = [];

        function generateTeams() {

            const numTeams = document.getElementById("numTeams").value;

            const container = document.getElementById("teamsContainer");

            container.innerHTML = "";

            tomSelectInstances = [];

            for (let i = 1; i <= numTeams; i++) {

                const teamCard = document.createElement("div");

                teamCard.className = "card mb-4 border-0 shadow-sm";

                teamCard.innerHTML = `
        
        <div class="card-body">

            <h4 class="mb-4">
                Team ${i}
            </h4>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Team Name
                    </label>

                    <input
                        type="text"
                        class="form-control team-name"
                    >

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Problem Statement No
                    </label>

                    <input
                        type="text"
                        class="form-control ps-no"
                    >

                </div>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Select Members
                </label>

                <select
                    multiple
                    class="member-select"
                >

                    ${participants.map(p =>
                    `<option value="${p.RollNo}">
                        ${p.Name} (${p.RollNo})
                    </option>`
                ).join("")}
                
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Submission Image</label>
                <input type="file"
       class="form-control team-file"
       accept=".pdf,application/pdf">
            </div>
                <div class="col-md-12 mb-3">

                    <label class="form-label">
                        Conclusion
                    </label>

                    <input
                        type="text"
                        class="form-control conclusion"
                    >

                </div>


        </div>
        `;

                container.appendChild(teamCard);
            }

            initializeTomSelects();
        }

        function initializeTomSelects() {

            document.querySelectorAll(".member-select").forEach(select => {

                const ts = new TomSelect(select, {

                    plugins: ['remove_button'],

                    create: false,

                    persist: false,
                    onItemAdd: function () {
                        this.control_input.value = "";
                    },

                    maxItems: null,

                    onChange: function () {

                        updateDisabledOptions();

                    }

                });

                tomSelectInstances.push(ts);

            });

        }

        function updateDisabledOptions() {

            // ==========================
            // Get globally selected students
            // ==========================

            let selected = new Set();

            tomSelectInstances.forEach(ts => {

                ts.items.forEach(item => {

                    selected.add(item);

                });

            });

            // ==========================
            // Disable in other dropdowns
            // ==========================

            tomSelectInstances.forEach(currentTS => {

                currentTS.clearOptions();

                participants.forEach(p => {

                    const isSelectedSomewhere =
                        selected.has(p.RollNo);

                    const isSelectedHere =
                        currentTS.items.includes(p.RollNo);

                    currentTS.addOption({
                        value: p.RollNo,
                        text: `${p.Name} (${p.RollNo})`,
                        disabled:
                            isSelectedSomewhere
                            &&
                            !isSelectedHere
                    });

                });

                currentTS.refreshOptions(false);

            });

        }

        async function prepareData() {
            const saveBtn = document.getElementById("saveBtn");
            const loadingMessage = document.getElementById("loadingMessage");

            if (saveBtn.disabled) {
                return;
            }

            saveBtn.disabled = true;
            saveBtn.innerText = "Generating...";
            loadingMessage.style.display = "block";
            const formData = new FormData();

            const teams = [];

            const cards = document.querySelectorAll("#teamsContainer .card");

            for (const [index, card] of cards.entries()) {

                const teamName = card.querySelector(".team-name").value;
                const psNo = card.querySelector(".ps-no").value;
                const conclusion = card.querySelector(".conclusion").value;

                const ts = tomSelectInstances[index];

                const members = [];

                ts.items.forEach(roll => {

                    const participant = participants.find(p => p.RollNo == roll);

                    members.push({
                        name: participant.Name,
                        id: participant.RollNo
                    });

                });

                teams.push({
                    team_no: String(index + 1),
                    team_name: teamName,
                    ps_no: psNo,
                    length: members.length,
                    members: members,
                    conclusion: conclusion
                });

                // =========================
                // ADD IMAGE FILE
                // =========================
                const fileInput =
                    card.querySelector(
                        ".team-file"
                    );

                if (
                    fileInput &&
                    fileInput.files.length > 0
                ) {
                    const file =
                        fileInput.files[0];

                    // PDF uploaded
                    if (
                        file.type ===
                        "application/pdf"
                    ) {

                        const collageBlob =
                            await pdfToCollage(file);

                        formData.append(
                            `mvp_${index}`,
                            collageBlob,
                            `team_${index}.jpg`
                        );
                    }

                    // Image uploaded
                    else if (
                        file.type.startsWith("image/")
                    ) {

                        formData.append(
                            `mvp_${index}`,
                            file
                        );
                    }
                }

            };

            // attach JSON
            formData.append("teams_data", JSON.stringify(teams));

            // send to backend
            fetch("/save_teams", {
                method: "POST",
                body: formData
            })
                .then(res => res.blob())
                .then(blob => {

                    const url = window.URL.createObjectURL(blob);

                    const a = document.createElement("a");

                    a.href = url;
                    a.download = "Report.docx";

                    document.body.appendChild(a);
                    a.click();
                    saveBtn.disabled = true;
                    loadingMessage.style.display = "none";

                    a.remove();

                    window.URL.revokeObjectURL(url);

                })
        }


        async function pdfToCollage(pdfFile) {

            const buffer = await pdfFile.arrayBuffer();

            const pdf = await pdfjsLib
                .getDocument({ data: buffer })
                .promise;

            const pages = [];

            // =====================
            // Render every PDF page
            // =====================

            for (let i = 1; i <= pdf.numPages; i++) {

                const page = await pdf.getPage(i);

                const viewport =
                    page.getViewport({
                        scale: 1
                    });

                const canvas =
                    document.createElement("canvas");

                const ctx =
                    canvas.getContext("2d");

                canvas.width =
                    viewport.width;

                canvas.height =
                    viewport.height;

                await page.render({
                    canvasContext: ctx,
                    viewport
                }).promise;

                pages.push(canvas);
            }

            const n = pages.length;

            if (n === 0) {
                throw new Error(
                    "No pages in PDF."
                );
            }

            // =====================
            // Auto grid
            // =====================

            const rows =
                Math.ceil(
                    Math.sqrt(n)
                );

            const cols =
                Math.ceil(
                    n / rows
                );

            const MAX_WIDTH =
                Math.min(
                    2500,
                    cols * 700
                );

            const aspect =
                pages[0].height /
                pages[0].width;

            const thumbWidth =
                Math.floor(
                    MAX_WIDTH / cols
                );

            const thumbHeight =
                Math.floor(
                    thumbWidth *
                    aspect
                );

            // =====================
            // Create collage canvas
            // =====================

            const collage =
                document.createElement(
                    "canvas"
                );

            collage.width =
                cols * thumbWidth;

            collage.height =
                rows * thumbHeight;

            const ctx =
                collage.getContext("2d");

            ctx.fillStyle =
                "white";

            ctx.fillRect(
                0,
                0,
                collage.width,
                collage.height
            );

            // =====================
            // Paste pages
            // =====================

            pages.forEach(
                (pageCanvas, index) => {

                    const row =
                        Math.floor(
                            index / cols
                        );

                    const col =
                        index % cols;

                    const x =
                        col *
                        thumbWidth;

                    const y =
                        row *
                        thumbHeight;

                    ctx.drawImage(
                        pageCanvas,
                        x,
                        y,
                        thumbWidth,
                        thumbHeight
                    );
                }
            );

            // =====================
            // Return JPEG blob
            // =====================

            return new Promise(
                resolve => {

                    collage.toBlob(
                        blob => {
                            resolve(blob);
                        },
                        "image/jpeg",
                        0.85
                    );

                }
            );
        }
    </script>

    <!-- script for the pdf to collage maker -->
</body>

</html>
