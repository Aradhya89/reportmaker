<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Team Builder</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tom Select -->

    <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5 mb-5">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-body p-5">

                <h1 class="mb-4">
                    Team Management
                </h1>

                <!-- ===================== -->
                <!-- Number of Teams -->
                <!-- ===================== -->

                <div class="mb-4">

                    <label class="form-label">
                        Number of Teams
                    </label>

                    <input type="number" id="numTeams" class="form-control" min="1">

                </div>

                <button class="btn btn-primary mb-5" onclick="generateTeams()">
                    Create Team Forms
                </button>

                <!-- ===================== -->
                <!-- Dynamic Teams -->
                <!-- ===================== -->


                <div id="teamsContainer"></div>

                <input type="hidden" name="teams_data" id="teamsData">

                <button type="button" class="btn btn-success btn-lg mt-4" onclick="prepareData()">
                    Save Teams
                </button>

                </form>

            </div>

        </div>

    </div>

    <!-- ===================== -->
    <!-- Scripts -->
    <!-- ===================== -->

    <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

    <script>

        const participants = JSON.parse('{{ participants | tojson | safe }}');

        let tomSelectInstances = [];

        function generateTeams() {

            const numTeams = document.getElementById("numTeams").value;

            const container = document.getElementById("teamsContainer");

            container.innerHTML = "";

            tomSelectInstances = [];

            for (let i = 1; i <= numTeams; i++) {

                const teamCard = document.createElement("div");

                teamCard.className = "card mb-4 border-0 shadow-sm";

                teamCard.innerHTML = `
        
        <div class="card-body">

            <h4 class="mb-4">
                Team ${i}
            </h4>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Team Name
                    </label>

                    <input
                        type="text"
                        class="form-control team-name"
                    >

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Problem Statement No
                    </label>

                    <input
                        type="text"
                        class="form-control ps-no"
                    >

                </div>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Select Members
                </label>

                <select
                    multiple
                    class="member-select"
                >

                    ${participants.map(p =>
                    `<option value="${p.RollNo}">
                        ${p.Name} (${p.RollNo})
                    </option>`
                ).join("")}
                
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Submission Image</label>

                <input type="file"
                    class="form-control team-mvp"   
                    accept="image/*">
            </div>


        </div>
        `;

                container.appendChild(teamCard);
            }

            initializeTomSelects();
        }

        function initializeTomSelects() {

            document.querySelectorAll(".member-select").forEach(select => {

                const ts = new TomSelect(select, {

                    plugins: ['remove_button'],

                    create: false,

                    persist: false,
                    onItemAdd: function () {
                        this.control_input.value = "";
                    },

                    maxItems: null,

                    onChange: function () {

                        updateDisabledOptions();

                    }

                });

                tomSelectInstances.push(ts);

            });

        }

        function updateDisabledOptions() {

            // ==========================
            // Get globally selected students
            // ==========================

            let selected = new Set();

            tomSelectInstances.forEach(ts => {

                ts.items.forEach(item => {

                    selected.add(item);

                });

            });

            // ==========================
            // Disable in other dropdowns
            // ==========================

            tomSelectInstances.forEach(currentTS => {

                currentTS.clearOptions();

                participants.forEach(p => {

                    const isSelectedSomewhere =
                        selected.has(p.RollNo);

                    const isSelectedHere =
                        currentTS.items.includes(p.RollNo);

                    currentTS.addOption({
                        value: p.RollNo,
                        text: `${p.Name} (${p.RollNo})`,
                        disabled:
                            isSelectedSomewhere
                            &&
                            !isSelectedHere
                    });

                });

                currentTS.refreshOptions(false);

            });

        }

        function prepareData() {

            const formData = new FormData();

            const teams = [];

            const cards = document.querySelectorAll("#teamsContainer .card");

            cards.forEach((card, index) => {

                const teamName = card.querySelector(".team-name").value;
                const psNo = card.querySelector(".ps-no").value;

                const ts = tomSelectInstances[index];

                const members = [];

                ts.items.forEach(roll => {

                    const participant = participants.find(p => p.RollNo == roll);

                    members.push({
                        name: participant.Name,
                        id: participant.RollNo
                    });

                });

                teams.push({
                    team_no: String(index + 1),
                    team_name: teamName,
                    ps_no: psNo,
                    length: members.length,
                    members: members
                });

                // =========================
                // ADD IMAGE FILE
                // =========================
                const fileInput = card.querySelector(".team-mvp");

                if (fileInput && fileInput.files.length > 0) {
                    formData.append(`mvp_${index}`, fileInput.files[0]);
                }

            });

            // attach JSON
            formData.append("teams_data", JSON.stringify(teams));

            // send to backend
            fetch("/save_teams", {
                method: "POST",
                body: formData
            })
                .then(res => res.blob())
                .then(blob => {

                    const url = window.URL.createObjectURL(blob);

                    const a = document.createElement("a");

                    a.href = url;
                    a.download = "Report.docx";

                    document.body.appendChild(a);
                    a.click();

                    a.remove();

                    window.URL.revokeObjectURL(url);
                });
        }
    </script>

</body>

</html>
