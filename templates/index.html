<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Hackathon Report Generator</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

    <div class="container mt-5 mb-5">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-body p-5">

                <h1 class="text-center mb-3">
                    Hackathon Report Generator
                </h1>

                <p class="text-center text-muted mb-5">
                    Upload participant CSV and generate reports easily
                </p>

                <form
                    action="/upload"
                    method="POST"
                    enctype="multipart/form-data"
                >

                    <!-- ===================== -->
                    <!-- Event Details -->
                    <!-- ===================== -->

                    <h4 class="mb-4">
                        Event Details
                    </h4>

                    <div class="row">

                        <div class="col-md-6 mb-4">

                            <label class="form-label">
                                Event Code
                            </label>

                            <input
                                type="text"
                                name="code"
                                class="form-control"
                                required
                            >

                        </div>

                        <div class="col-md-6 mb-4">

                            <label class="form-label">
                                Date
                            </label>

                            <input
                                type="text"
                                name="date"
                                class="form-control"
                                required
                            >

                        </div>

                        <div class="col-md-6 mb-4">

                            <label class="form-label">
                                Duration
                            </label>

                            <input
                                type="text"
                                name="duration"
                                class="form-control"
                                value="24 Hours"
                            >

                        </div>

                        <div class="col-md-6 mb-4">

                            <label class="form-label">
                                Venue
                            </label>

                            <input
                                type="text"
                                name="venue"
                                class="form-control"
                                value="IdeaPad, Einstein Block, ITM Gwalior"
                            >

                        </div>
                        <div class="col-md-4 mb-4">

                            <label class="form-label">
                                No of Registered Students
                            </label>

                            <input
                                type="text"
                                name="register1"
                                class="form-control"
                                required
                            >
                        </div>

                        <div class="col-md-4 mb-4">

                            <label class="form-label">
                                No of Reported Students
                            </label>

                            <input
                                type="text"
                                name="register2"
                                class="form-control"
                                required
                            >
                        </div>
                        <div class="col-md-4 mb-4">

                            <label class="form-label">
                                No of Students Completed Hackathon
                            </label>

                            <input
                                type="text"
                                name="register3"
                                class="form-control"
                                required
                            >
                        </div>
                    </div>

                    <!-- ===================== -->
                    <!-- CSV Upload -->
                    <!-- ===================== -->

                    <h4 class="mb-4 mt-4">
                        Upload Participants CSV
                    </h4>

                    <div class="mb-4">

                        <input
                            type="file"
                            name="csv_file"
                            class="form-control"
                            accept=".csv"
                            required
                        >

                    </div>

                    <!-- ===================== -->
                    <!-- Submit Button -->
                    <!-- ===================== -->

                    <div class="d-grid">

                        <button
                            type="submit"
                            class="btn btn-primary btn-lg"
                        >
                            Continue →
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
