<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Hackathon Report Generator</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5 mb-5">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-body p-5">

                <h1 class="text-center mb-3">
                    Hackathon Report Generator
                </h1>

                <form id="eventForm" action="/event" method="POST" enctype="multipart/form-data">
                    <div class="mb-4">

                        <div class="mb-3">
                            <label class="form-label">Event Image</label>

                            <input type="file" name="image1" class="form-control team-mvp" accept="image/*">
                        </div>

                        <div class="mb-3">

                            <input type="file" name="image2" class="form-control team-mvp" accept="image/*">
                        </div>

                        <div class="mb-3">

                            <input type="file" name="image3" class="form-control team-mvp" accept="image/*">
                        </div>
                        <div class="mb-3">

                            <input type="file" name="image4" class="form-control team-mvp" accept="image/*">
                        </div>

                    </div>

                    <!-- ===================== -->
                    <!-- Submit Button -->
                    <!-- ===================== -->

                    <div class="d-grid">

                        <button id="submitBtn" type="submit" class="btn btn-primary btn-lg">
                            Continue →
                        </button>
                        <div id="loadingMessage"
     class="mt-3"
     style="display:none;">
    <div class="spinner-border spinner-border-sm"
         role="status">
    </div>

    Processing images... Please wait.
</div>

                    </div>

                </form>

            </div>

        </div>

    </div>
    <script>
const form = document.getElementById("eventForm");
const submitBtn = document.getElementById("submitBtn");
const loadingMessage =
    document.getElementById("loadingMessage");

form.addEventListener(
    "submit",
    async function (e) {

        e.preventDefault();

        if (submitBtn.disabled) {
            return;
        }

        submitBtn.disabled = true;
        submitBtn.innerText = "Processing...";
        loadingMessage.style.display = "block";

        try {

            const compressedData =
                new FormData();

            const files =
                [...form.elements]
                .filter(
                    element =>
                        element.type === "file" &&
                        element.files.length > 0
                );

            const total = files.length;
            let current = 0;

            for (const element of files) {

                current++;

                loadingMessage.innerHTML = `
                    <div class="spinner-border spinner-border-sm"
                         role="status"></div>
                    Compressing image ${current}
                    of ${total}...
                `;

                const file =
                    element.files[0];

                const compressed =
                    await compressImage(file);

                compressedData.append(
                    element.name,
                    compressed,
                    file.name.replace(
                        /\.[^/.]+$/,
                        ".jpg"
                    )
                );
            }

            loadingMessage.innerHTML = `
                <div class="spinner-border spinner-border-sm"
                     role="status"></div>
                Uploading images...
            `;

            const response =
                await fetch(
                    form.action,
                    {
                        method: "POST",
                        body: compressedData
                    }
                );

            if (response.redirected) {
                window.location.href =
                    response.url;
            }

        } catch (err) {

            console.error(err);

            submitBtn.disabled = false;
            submitBtn.innerText =
                "Continue →";

            loadingMessage.style.display =
                "none";

            alert(
                "Something went wrong."
            );
        }
    }
);


function compressImage(file) {
    return new Promise((resolve) => {

        const reader = new FileReader();
        const img = new Image();

        reader.onload = function (e) {
            img.src = e.target.result;
        };

        img.onload = function () {

            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            let width = img.width;
            let height = img.height;

            const MAX_WIDTH = 1400;

            if (width > MAX_WIDTH) {
                height = height * MAX_WIDTH / width;
                width = MAX_WIDTH;
            }

            canvas.width = width;
            canvas.height = height;

            ctx.drawImage(img, 0, 0, width, height);

            canvas.toBlob(
                (blob) => resolve(blob),
                "image/jpeg",
                0.75
            );
        };

        reader.readAsDataURL(file);
    });
}
</script>

</body>

</html>
