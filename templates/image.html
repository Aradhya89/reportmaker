<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Hackathon Report Generator</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5 mb-5">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-body p-5">

                <h1 class="text-center mb-3">
                    Hackathon Report Generator
                </h1>

                <form id="eventForm" action="/event" method="POST" enctype="multipart/form-data">
                    <div class="mb-4">

                        <div class="mb-3">
                            <label class="form-label">Event Image</label>

                            <input type="file" name="image1" class="form-control team-mvp" accept="image/*">
                        </div>

                        <div class="mb-3">

                            <input type="file" name="image2" class="form-control team-mvp" accept="image/*">
                        </div>

                        <div class="mb-3">

                            <input type="file" name="image3" class="form-control team-mvp" accept="image/*">
                        </div>
                        <div class="mb-3">

                            <input type="file" name="image4" class="form-control team-mvp" accept="image/*">
                        </div>

                    </div>

                    <!-- ===================== -->
                    <!-- Submit Button -->
                    <!-- ===================== -->

                    <div class="d-grid">

                        <button type="submit" class="btn btn-primary btn-lg">
                            Continue →
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>
    <script>
const form = document.getElementById("eventForm");

form.addEventListener("submit", async function (e) {
    e.preventDefault();

    const compressedData = new FormData();

    for (const element of form.elements) {

        if (element.type === "file") {

            const file = element.files[0];

            if (!file) continue;

            const compressed = await compressImage(file);

            compressedData.append(
                element.name,
                compressed,
                file.name.replace(/\.[^/.]+$/, ".jpg")
            );
        }
    }

    const response = await fetch(form.action, {
        method: "POST",
        body: compressedData
    });

    if (response.redirected) {
        window.location.href = response.url;
    }
});

function compressImage(file) {
    return new Promise((resolve) => {

        const reader = new FileReader();
        const img = new Image();

        reader.onload = function (e) {
            img.src = e.target.result;
        };

        img.onload = function () {

            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            let width = img.width;
            let height = img.height;

            const MAX_WIDTH = 1400;

            if (width > MAX_WIDTH) {
                height = height * MAX_WIDTH / width;
                width = MAX_WIDTH;
            }

            canvas.width = width;
            canvas.height = height;

            ctx.drawImage(img, 0, 0, width, height);

            canvas.toBlob(
                (blob) => resolve(blob),
                "image/jpeg",
                0.75
            );
        };

        reader.readAsDataURL(file);
    });
}
</script>

</body>

</html>
