<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Hackathon Report Generator</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5 mb-5">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-body p-5">

                <h1 class="text-center mb-3">
                    Hackathon Report Generator
                </h1>

                <form action="/event" method="POST" enctype="multipart/form-data">

                    <div class="mb-4">

                        <div class="mb-3">
                            <label class="form-label">Event Image</label>

                            <input type="file" name = "image1" class="form-control team-mvp" accept="image/*">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Event Image</label>

                            <input type="file" name = "image2" class="form-control team-mvp" accept="image/*">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Event Image</label>

                            <input type="file" name = "image3" class="form-control team-mvp" accept="image/*">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Event Image</label>

                            <input type="file" name = "image4" class="form-control team-mvp" accept="image/*">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Event Image</label>

                            <input type="file" name = "image5" class="form-control team-mvp" accept="image/*">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Event Image</label>

                            <input type="file" name = "image6" class="form-control team-mvp" accept="image/*">
                        </div>

                    </div>

                    <!-- ===================== -->
                    <!-- Submit Button -->
                    <!-- ===================== -->

                    <div class="d-grid">

                        <button type="submit" class="btn btn-primary btn-lg">
                            Continue →
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
